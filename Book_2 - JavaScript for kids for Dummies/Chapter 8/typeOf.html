<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Type Of</title>
</head>
<body>
    <script>
        var hello1 = 7
        var doTheMath = 7 + 8 + 36 + 18 + 1
        var str1 = "It's 5 o'clock somewhere"
        var hello = false
        var number = "123"
        
        console.log("What type of data is hello1: ",typeof hello1)
        console.log("What type of data is number: ",typeof number)
        console.log("What type of data is str1: ",typeof str1)
        document.write("What type of data is doTheMath: ",typeof doTheMath)
        alert( typeof hello)
        alert(typeof doTheMath)
    </script>
</body>
</html>
